server:
  port: 8085

spring:
  application:
    name: cms-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/cms_db}
    username: ${DB_USERNAME:cms_user}
    password: ${DB_PASSWORD:cms_password}
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: false
    baseline-on-migrate: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method

# ── JWT ──────────────────────────────────────────────────────────────────────
jwt:
  # Production: override via env var JWT_SECRET (openssl rand -base64 64)
  secret: ${JWT_SECRET:dGhpc0lzQURldmVsb3BtZW50U2VjcmV0S2V5Rm9yQ21zU2VydmljZURvTm90VXNlSW5Qcm9kdWN0aW9uMTIzNDU2Nzg5MA==}
  access-token-expiry: 3600   # seconds (1 hour)
  issuer: cms-service

# ── Security ─────────────────────────────────────────────────────────────────
security:
  max-failed-attempts: 5
  lockout-duration: 900       # seconds (15 minutes)

# ── Cookie ───────────────────────────────────────────────────────────────────
cookie:
  domain: ${COOKIE_DOMAIN:}
  secure: ${COOKIE_SECURE:false}   # false for local dev (no HTTPS), true in production

