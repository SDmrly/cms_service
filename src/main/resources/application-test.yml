spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false

  cache:
    type: none

# ── JWT (test) ────────────────────────────────────────────────────────────────
jwt:
  # Safe dummy key for tests — 64+ chars Base64
  secret: dGVzdFNlY3JldEtleUZvckpXVFVuaXRUZXN0aW5nT25seU5vdEZvclByb2R1Y3Rpb24hISE=
  access-token-expiry: 3600
  issuer: cms-service

security:
  max-failed-attempts: 5
  lockout-duration: 900

cookie:
  domain:
  secure: false   # allow plain HTTP in unit tests
